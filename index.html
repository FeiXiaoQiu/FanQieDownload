<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>番茄小说下载器</title>
    <link rel="stylesheet" href="styles.css?v=20260724x">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
    <div class="popup-container" id="popupContainer"></div>

    <div class="book-preview-mask" id="bookPreviewMask" hidden>
        <div class="book-preview" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
            <div class="book-preview-head">
                <p class="book-preview-head-title">书籍简介</p>
                <button type="button" class="book-preview-close" id="previewCloseBtn" aria-label="关闭">×</button>
            </div>
            <div class="book-preview-meta-row">
                <div class="book-preview-cover-wrap">
                    <img class="book-preview-cover" id="previewCover" alt="" hidden>
                    <div class="book-preview-cover-ph" id="previewCoverPh" aria-hidden="true"></div>
                </div>
                <div class="book-preview-info">
                    <h3 class="book-preview-title" id="previewTitle">—</h3>
                    <p class="book-preview-meta" id="previewMeta"></p>
                    <p class="book-preview-id" id="previewId"></p>
                </div>
            </div>
            <div class="book-preview-desc" id="previewDesc"></div>
            <div class="book-preview-actions">
                <button type="button" class="btn btn-primary" id="previewDownloadBtn">
                    <span>下载</span>
                </button>
                <button type="button" class="btn btn-secondary" id="previewReaderBtn">
                    <span>新开页阅读</span>
                </button>
                <button type="button" class="btn btn-secondary" id="previewCloseBtn2">关闭</button>
            </div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <header class="header">
            <h1 class="title">番茄小说下载器</h1>
            <p class="subtitle">搜书 · 简介 · 批量下载 TXT</p>
        </header>

        <div class="search-bar">
            <input type="text"
                   class="input-field"
                   id="bookId"
                   placeholder="书名 / ID / 分享链接"
                   autocomplete="off"
                   aria-label="书名、ID 或分享链接">
            <button type="button" class="btn btn-primary search-submit" onclick="searchByName()" id="searchBtn">
                <span>搜索</span>
            </button>
            <button type="button" class="btn btn-danger search-cancel" onclick="cancelCurrentJob()" id="cancelBtn" style="display:none;">
                <span>取消</span>
            </button>
        </div>

        <div class="search-results" id="searchResults"></div>

        <div class="loading-section" id="loadingSection">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <div class="loading-text" id="loadingText">正在准备下载，请稍候...</div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-card" id="resultCard">
                <div class="result-title">
                    <span id="resultIcon" class="result-dot" aria-hidden="true"></span>
                    <span id="resultTitle">就绪</span>
                </div>
                <div class="result-message" id="resultMessage"></div>
                <a href="#" class="download-link" id="downloadLink" target="_blank" style="display: none;">
                    手动下载
                </a>
                <span class="manual-download-hint" id="manualHint" style="display: none;">
                    若未自动下载，点上方链接
                </span>
                <button class="downgrade-btn" id="downgradeBtn" style="display: none;" onclick="window.open('https://m.wandoujia.com/apps/8048758/history_v68132', '_blank')">
                    更换版本
                </button>
            </div>
        </div>

        <details class="download-options" id="downloadOptions" hidden>
            <summary class="download-options-summary">下载选项（单本）</summary>
            <div class="download-options-body">
                <div class="range-row" id="rangeRow">
                    <label class="range-item">
                        <span>起始章</span>
                        <input type="number" id="startChapter" min="1" placeholder="1" class="range-input">
                    </label>
                    <label class="range-item">
                        <span>结束章</span>
                        <input type="number" id="endChapter" min="1" placeholder="全部" class="range-input">
                    </label>
                    <label class="range-item range-check">
                        <input type="checkbox" id="resumeCache" checked>
                        <span>断点续传</span>
                    </label>
                </div>
                <div class="node-status" id="nodeStatus">节点检测中…</div>
            </div>
        </details>

        <footer class="site-footer">
            <span>v2.4.0</span>
            <span class="footer-dot">·</span>
            <span>是非酋啊awa</span>
            <span class="footer-dot">·</span>
            <a class="github-link"
               href="https://github.com/FeiXiaoQiu/FanQieDownload"
               target="_blank"
               rel="noopener noreferrer">GitHub</a>
        </footer>
    </div>

    <script src="browser-client.js?v=20260724x"></script>
    <script src="app.js?v=20260724y"></script>
</body>
</html>
