# Android APK：Actions 手动构建 / 打 v* tag 挂 Release
# 本仓库开发环境无 Android SDK，以 GitHub Actions 构建为准

name: Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist-apk
          cp app/build/outputs/apk/debug/*.apk dist-apk/fanqie-android-debug.apk
          cp app/build/outputs/apk/release/*.apk dist-apk/fanqie-android-release.apk
          ls -lh dist-apk/

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/dist-apk/fanqie-android-debug.apk
            android/dist-apk/fanqie-android-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
