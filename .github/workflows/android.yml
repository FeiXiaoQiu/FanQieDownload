# Android APK：Actions 手动构建 / 打 v* tag 挂 Release
# 产物命名：观隅-{version}-{abi}.apk（arm64-v8a / armeabi-v7a / universal）
# 不标注 debug/release、不写 android

name: Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        working-directory: .
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)
            VER="${VER:-0.0.0}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved APK version: $VER"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APKs (per-ABI + universal)
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Name APKs as 观隅-{version}-{abi}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p dist-apk
          OUT="app/build/outputs/apk/release"
          # Gradle ABI splits 产物：app-<abi>-release.apk / app-universal-release.apk
          shopt -s nullglob
          for f in "$OUT"/*.apk; do
            base="$(basename "$f")"
            # app-arm64-v8a-release.apk -> arm64-v8a
            abi="$(echo "$base" | sed -E 's/^app-//; s/-release\.apk$//; s/\.apk$//')"
            if [[ -z "$abi" || "$abi" == "app" ]]; then
              abi="universal"
            fi
            dest="dist-apk/观隅-${VER}-${abi}.apk"
            cp -f "$f" "$dest"
            echo "packed: $dest"
          done
          ls -lh dist-apk/
          test -n "$(ls -A dist-apk)" || { echo "no apk produced"; exit 1; }

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guanyu-${{ steps.ver.outputs.version }}-apks
          path: android/dist-apk/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/dist-apk/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
