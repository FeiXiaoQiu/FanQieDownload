# Android APK：Actions 手动构建 / 打 v* tag 挂 Release
# APK 文件名必须带版本号，例如 fanqie-android-1.0.1-release.apk

name: Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        working-directory: .
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts | head -1)
            VER="${VER:-0.0.0}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved APK version: $VER"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Name APKs with version
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p dist-apk
          cp app/build/outputs/apk/debug/*.apk "dist-apk/fanqie-android-${VER}-debug.apk"
          cp app/build/outputs/apk/release/*.apk "dist-apk/fanqie-android-${VER}-release.apk"
          ls -lh dist-apk/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-android-${{ steps.ver.outputs.version }}-debug
          path: android/dist-apk/fanqie-android-${{ steps.ver.outputs.version }}-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-android-${{ steps.ver.outputs.version }}-release
          path: android/dist-apk/fanqie-android-${{ steps.ver.outputs.version }}-release.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/dist-apk/fanqie-android-${{ steps.ver.outputs.version }}-debug.apk
            android/dist-apk/fanqie-android-${{ steps.ver.outputs.version }}-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
